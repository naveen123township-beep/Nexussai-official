<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI - Portal Access</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="db-sync.js"></script>
    <style>
        body { background-color: #0b0f19; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="bg-[#111625] border border-zinc-800/80 rounded-2xl p-6 w-full max-w-sm text-center shadow-2xl relative overflow-hidden">
        
        <div class="mb-6 px-1">
            <div class="w-full bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 text-slate-900 font-bold text-sm uppercase tracking-wider py-3.5 px-4 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.25)]">
                Best Online Earning Website
            </div>
        </div>

        <div class="w-14 h-14 bg-blue-500/10 border border-blue-500/20 text-blue-400 text-2xl flex items-center justify-center rounded-full mx-auto mb-4 shadow-[0_0_15px_rgba(59,130,246,0.1)]">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        
        <h2 class="text-2xl font-bold text-white tracking-tight">NEXUS AI</h2>
        <p class="text-xs text-zinc-400 mt-1 mb-6 uppercase tracking-wider">Automatic Profit Dashboard</p>

        <div class="space-y-4 text-left">
            <div>
                <label class="block text-xs font-semibold text-zinc-400 mb-1">Mobile Number</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-zinc-500 text-sm font-medium">+91</span>
                    <input type="tel" id="login-mobile" placeholder="Enter 10-digit number" maxlength="10" 
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-xl pl-12 pr-3 py-2.5 text-sm text-white outline-none focus:border-blue-500 font-mono tracking-wide">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-zinc-400 mb-1">Password</label>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-zinc-500 text-xs"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="login-password" placeholder="••••••••" 
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-xl pl-9 pr-3 py-2.5 text-sm text-white outline-none focus:border-blue-500 tracking-widest">
                </div>
            </div>

            <div class="flex items-start gap-2.5 pt-1">
                <input type="checkbox" id="policy-checkbox" checked class="w-4 h-4 mt-0.5 rounded border-zinc-800 bg-zinc-950 text-blue-600 focus:ring-0 outline-none cursor-pointer">
                <label for="policy-checkbox" class="text-[11px] text-zinc-400 leading-tight select-none">
                    I acknowledge and agree to the platform's <span class="text-blue-500 font-medium">Terms & Conditions</span>.
                </label>
            </div>

            <button onclick="handlePortalAccess()" id="submit-btn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 rounded-xl text-xs tracking-wider uppercase transition cursor-pointer shadow-md shadow-blue-900/10">
                Secure Log In
            </button>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            if (typeof pullFromCloudRegistry === "function") {
                await pullFromCloudRegistry();
            }
        });

        async function handlePortalAccess() {
            const mobileInput = document.getElementById("login-mobile").value.trim();
            const passwordInput = document.getElementById("login-password").value.trim();
            const policyCheckbox = document.getElementById("policy-checkbox");

            if (!policyCheckbox.checked) { alert("You must agree to the Terms of Service."); return; }
            if (mobileInput.length !== 10 || isNaN(mobileInput)) { alert("Enter a valid mobile number."); return; }
            if (passwordInput.length < 4) { alert("Password must be at least 4 characters long."); return; }

            const configuredUserId = `NX-${mobileInput}`;
            const submitBtn = document.getElementById("submit-btn");
            submitBtn.innerText = "Syncing Cloud Verification...";

            if (typeof pullFromCloudRegistry === "function") {
                await pullFromCloudRegistry();
            }

            const storedPassword = localStorage.getItem(`pwd_${configuredUserId}`);

            if (storedPassword) {
                // User exists -> Check credentials password
                if (storedPassword !== passwordInput) {
                    alert("Invalid account credentials.");
                    submitBtn.innerText = "Secure Log In";
                    return;
                }
            } else {
                // User does not exist -> Seamlessly register profile details instantly
                localStorage.setItem(`pwd_${configuredUserId}`, passwordInput);
                localStorage.setItem(`balance_${configuredUserId}`, "0.00");
                localStorage.setItem(`revenue_${configuredUserId}`, "0.00");
                localStorage.setItem(`packages_${configuredUserId}`, "[]");

                let centralUserDatabase = JSON.parse(localStorage.getItem("admin_crm_users") || "[]");
                if (!centralUserDatabase.includes(configuredUserId)) {
                    centralUserDatabase.push(configuredUserId);
                    localStorage.setItem("admin_crm_users", JSON.stringify(centralUserDatabase));
                }
            }

            // Set active device session identifier
            localStorage.setItem("active_user_id", configuredUserId);
            
            if (typeof uploadToCloudRegistry === "function") {
                await uploadToCloudRegistry();
            }
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
