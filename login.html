<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI - Portal Access</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link the Cloud Synchronizer -->
    <script src="db-sync.js"></script>
    <style>
        body { background-color: #0b0f19; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <!-- Card Container matching the reference visual structure -->
    <div class="bg-[#111625] border border-zinc-800/80 rounded-2xl p-6 w-full max-w-sm text-center shadow-2xl relative overflow-hidden">
        
        <!-- Clean Capsule Pill Banner Section matching 1000038448.jpg -->
        <div class="mb-6 px-1">
            <div class="w-full bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 text-slate-900 font-bold text-sm uppercase tracking-wider py-3.5 px-4 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.25)]">
                Best Online Earning Website
            </div>
        </div>

        <!-- Shield Icon Badge Component -->
        <div id="portal-icon" class="w-14 h-14 bg-blue-500/10 border border-blue-500/20 text-blue-400 text-2xl flex items-center justify-center rounded-full mx-auto mb-4 shadow-[0_0_15px_rgba(59,130,246,0.1)]">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        
        <h2 class="text-2xl font-bold text-white tracking-tight">NEXUS AI</h2>
        <p id="portal-subtitle" class="text-xs text-zinc-400 mt-1 mb-6 uppercase tracking-wider">Automatic Profit Dashboard</p>

        <div class="space-y-4 text-left">
            <!-- Mobile Field Input Frame -->
            <div>
                <label class="block text-xs font-semibold text-zinc-400 mb-1">Mobile Number</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-zinc-500 text-sm font-medium">+91</span>
                    <input type="tel" id="login-mobile" placeholder="Enter 10-digit number" maxlength="10" 
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-xl pl-12 pr-3 py-2.5 text-sm text-white outline-none focus:border-blue-500 font-mono tracking-wide">
                </div>
            </div>

            <!-- Password Field Input Frame -->
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label id="password-label" class="block text-xs font-semibold text-zinc-400">Password</label>
                    <button onclick="toggleMode()" id="mode-toggle-btn" class="text-[11px] font-bold text-blue-500 hover:text-blue-400 cursor-pointer transition">
                        Create Account
                    </button>
                </div>
                <div class="relative">
                    <span class="absolute left-3 top-3 text-zinc-500 text-xs"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="login-password" placeholder="••••••••" 
                           class="w-full bg-zinc-950 border border-zinc-800 rounded-xl pl-9 pr-3 py-2.5 text-sm text-white outline-none focus:border-blue-500 tracking-widest">
                </div>
            </div>

            <!-- Terms Checklist Flag -->
            <div class="flex items-start gap-2.5 pt-1">
                <input type="checkbox" id="policy-checkbox" class="w-4 h-4 mt-0.5 rounded border-zinc-800 bg-zinc-950 text-blue-600 focus:ring-0 outline-none cursor-pointer">
                <label for="policy-checkbox" class="text-[11px] text-zinc-400 leading-tight select-none">
                    I acknowledge and agree to the platform's <span class="text-blue-500 font-medium">Terms & Conditions</span>.
                </label>
            </div>

            <!-- Portal Interaction Trigger -->
            <button onclick="handleSubmit()" id="submit-btn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 rounded-xl text-xs tracking-wider uppercase transition cursor-pointer shadow-md shadow-blue-900/10">
                Sign In Access
            </button>
        </div>
    </div>

    <script>
        let isSignUpMode = false;

        // Pull active system registry configuration states instantly over layout window mounting
        window.addEventListener('DOMContentLoaded', async () => {
            if (typeof pullFromCloudRegistry === "function") {
                await pullFromCloudRegistry();
            }
        });

        function toggleMode() {
            const toggleBtn = document.getElementById("mode-toggle-btn");
            const submitBtn = document.getElementById("submit-btn");
            const portalIcon = document.getElementById("portal-icon");
            const portalSubtitle = document.getElementById("portal-subtitle");
            const passwordLabel = document.getElementById("password-label");
            
            isSignUpMode = !isSignUpMode;
            if (isSignUpMode) {
                toggleBtn.innerText = "Existing Login";
                submitBtn.innerText = "Create & Register Account";
                portalSubtitle.innerText = "Registration Portal";
                passwordLabel.innerText = "Set Account Password";
                portalIcon.innerHTML = '<i class="fa-solid fa-user-plus"></i>';
            } else {
                toggleBtn.innerText = "Create Account";
                submitBtn.innerText = "Sign In Access";
                portalSubtitle.innerText = "Automatic Profit Dashboard";
                passwordLabel.innerText = "Password";
                portalIcon.innerHTML = '<i class="fa-solid fa-shield-halved"></i>';
            }
        }

        async function handleSubmit() {
            const mobileInput = document.getElementById("login-mobile").value.trim();
            const passwordInput = document.getElementById("login-password").value.trim();
            const policyCheckbox = document.getElementById("policy-checkbox");

            if (!policyCheckbox.checked) { alert("You must agree to the Terms of Service."); return; }
            if (mobileInput.length !== 10 || isNaN(mobileInput)) { alert("Enter a valid mobile number."); return; }
            if (passwordInput.length < 4) { alert("Password must be at least 4 characters long."); return; }

            const configuredUserId = `NX-${mobileInput}`;
            document.getElementById("submit-btn").innerText = "Processing Realtime Sync...";

            // Run database fetching sequences cleanly
            if (typeof pullFromCloudRegistry === "function") {
                await pullFromCloudRegistry();
            }

            if (isSignUpMode) {
                let centralUserDatabase = JSON.parse(localStorage.getItem("admin_crm_users") || "[]");

                if (localStorage.getItem(`pwd_${configuredUserId}`)) {
                    alert("This number is already linked to a registered account.");
                    document.getElementById("submit-btn").innerText = "Create & Register Account";
                    toggleMode();
                    return;
                }

                // Provision base object fields mapping configurations inside temporary local arrays
                localStorage.setItem(`pwd_${configuredUserId}`, passwordInput);
                localStorage.setItem(`balance_${configuredUserId}`, "0.00");
                localStorage.setItem(`revenue_${configuredUserId}`, "0.00");
                localStorage.setItem(`packages_${configuredUserId}`, "[]");

                if (!centralUserDatabase.includes(configuredUserId)) {
                    centralUserDatabase.push(configuredUserId);
                    localStorage.setItem("admin_crm_users", JSON.stringify(centralUserDatabase));
                }

                localStorage.setItem("active_user_id", configuredUserId);
                
                // Commit updates live to persistent storage file definitions
                if (typeof uploadToCloudRegistry === "function") {
                    await uploadToCloudRegistry();
                }
                window.location.href = "index.html";
            } else {
                const storedPassword = localStorage.getItem(`pwd_${configuredUserId}`);
                if (!storedPassword || storedPassword !== passwordInput) {
                    alert("Invalid account credentials.");
                    document.getElementById("submit-btn").innerText = "Sign In Access";
                    return;
                }
                localStorage.setItem("active_user_id", configuredUserId);
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
