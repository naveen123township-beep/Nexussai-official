<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Central Control Desk</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #090d16; font-family: system-ui, -apple-system, sans-serif; }
        .admin-card { background: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-4 antialiased">

    <!-- HEADER NAVIGATION DESK -->
    <header class="max-w-xl mx-auto mb-6 flex justify-between items-center bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-amber-500/10 border border-amber-500/30 text-amber-500 flex items-center justify-center rounded-lg text-sm">
                <i class="fa-solid fa-terminal"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold text-white tracking-wide">NEXUS SYSTEM ADMIN</h1>
                <p class="text-[10px] text-zinc-500 font-mono">Local-Sandbox Environment</p>
            </div>
        </div>
        <span class="text-[10px] font-mono bg-zinc-950 px-2.5 py-1 rounded-md text-zinc-400 border border-zinc-800" id="live-clock">IST: --:--:--</span>
    </header>

    <main class="max-w-xl mx-auto space-y-6">

        <!-- MODULE 1: DIRECT BALANCE SHEET CONTROL MANIPULATION -->
        <section class="admin-card rounded-2xl p-5 space-y-4 shadow-xl">
            <h2 class="text-xs font-bold text-amber-400 tracking-wider uppercase flex items-center gap-1.5">
                <i class="fa-solid fa-wallet"></i> Manage User Balance & Ledger
            </h2>
            
            <div class="space-y-3">
                <!-- User ID Lookup Entry -->
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 mb-1">Target User ID</label>
                    <div class="flex gap-2">
                        <input type="text" id="target-uid" placeholder="e.g., NX-9876" class="flex-1 bg-slate-950 border border-slate-800 focus:border-amber-500 rounded-xl px-3 py-2 text-sm text-white outline-none font-mono">
                        <button onclick="lookupUserMetrics()" class="bg-slate-800 hover:bg-slate-700 text-white font-bold text-xs px-4 rounded-xl transition cursor-pointer">
                            Fetch Info
                        </button>
                    </div>
                </div>

                <!-- Display area for fetched user data -->
                <div id="user-stats-preview" class="hidden bg-slate-950/80 border border-slate-800/60 rounded-xl p-3 text-xs space-y-1.5 font-mono">
                    <p class="text-slate-400">Viewing Data For: <span id="preview-id" class="text-white font-bold">--</span></p>
                    <div class="grid grid-cols-2 gap-2 mt-1 pt-1 border-t border-slate-800/40 text-zinc-400">
                        <div>Current Wallet: <span id="preview-bal" class="text-emerald-400 font-bold">₹0.00</span></div>
                        <div>Total Revenue: <span id="preview-rev" class="text-blue-400 font-bold">₹0.00</span></div>
                    </div>
                </div>

                <!-- Operations Inputs -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 mb-1">Wallet Action Balance (₹)</label>
                        <input type="number" id="mod-balance" placeholder="e.g., 500 or -200" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white outline-none font-mono">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-slate-400 mb-1">Total Revenue Modifier (₹)</label>
                        <input type="number" id="mod-revenue" placeholder="e.g., 1000" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white outline-none font-mono">
                    </div>
                </div>

                <button onclick="applyLedgerChanges()" class="w-full bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 text-white font-bold py-2.5 rounded-xl text-xs tracking-wider uppercase transition active:scale-[0.99] cursor-pointer shadow-md shadow-orange-950/20">
                    Apply Operational Updates
                </button>
            </div>
        </section>

        <!-- MODULE 2: DEPOSIT TRANSACTION QUEUE APPROVAL DESK -->
        <section class="admin-card rounded-2xl p-5 space-y-4 shadow-xl">
            <div class="flex justify-between items-center">
                <h2 class="text-xs font-bold text-blue-400 tracking-wider uppercase flex items-center gap-1.5">
                    <i class="fa-solid fa-receipt"></i> Incoming UTR Verification Desk
                </h2>
                <button onclick="loadUpiQueue()" class="text-[10px] text-zinc-400 bg-slate-800 hover:bg-slate-700 px-2 py-1 rounded font-medium transition cursor-pointer">
                    <i class="fa-solid fa-rotate-right mr-1"></i> Refresh
                </button>
            </div>

            <div id="queue-container" class="space-y-3 max-h-[260px] overflow-y-auto pr-1">
                <!-- Dynamically parsed scripts from customer node requests -->
            </div>
        </section>

        <!-- MODULE 3: ANNOUNCEMENT BROADCASTS & USER ALERTS -->
        <section class="admin-card rounded-2xl p-5 space-y-4 shadow-xl">
            <h2 class="text-xs font-bold text-indigo-400 tracking-wider uppercase flex items-center gap-1.5">
                <i class="fa-solid fa-bullhorn"></i> Global Notices & Specific Popups
            </h2>
            
            <div class="space-y-3 text-xs">
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 mb-1">System-Wide Header Broadcast Notice</label>
                    <div class="flex gap-2">
                        <input type="text" id="global-notice-input" placeholder="All servers fully running..." class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-white outline-none">
                        <button onclick="saveGlobalNotice()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-4 rounded-xl transition cursor-pointer">Set</button>
                    </div>
                </div>

                <div class="border-t border-slate-800/60 pt-3">
                    <label class="block text-[11px] font-semibold text-slate-400 mb-1">Push Telegram Overlay Popup Alert to Target User ID</label>
                    <div class="flex gap-2">
                        <input type="text" id="alert-target-uid" placeholder="Target User ID (e.g., NX-9876)" class="w-1/3 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-white outline-none font-mono">
                        <input type="text" id="specific-notice-input" placeholder="Custom tracking alert notice description..." class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-white outline-none">
                        <button onclick="pushUserAlert()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-3 rounded-xl transition cursor-pointer">Push</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- ADMIN LOGIC SYSTEM OPERATIONS -->
    <script>
        // Real-Time IST Clock
        function updateClock() {
            const d = new Date();
            const utc = d.getTime() + (d.getTimezoneOffset() * 60000);
            const ist = new Date(utc + (3600000 * 5.5));
            document.getElementById('live-clock').innerText = "IST: " + ist.toLocaleTimeString('en-US', { hour12: false });
        }
        setInterval(updateClock, 1000);

        // LOOKUP USER BY CUSTOM ID ENTRY
        function lookupUserMetrics() {
            const uid = document.getElementById('target-uid').value.trim();
            if(!uid) { alert("Please provide a Target User ID."); return; }

            const bal = parseFloat(localStorage.getItem(`balance_${uid}`) || 0);
            const rev = parseFloat(localStorage.getItem(`revenue_${uid}`) || 0);

            document.getElementById('preview-id').innerText = uid;
            document.getElementById('preview-bal').innerText = "₹" + bal.toFixed(2);
            document.getElementById('preview-rev').innerText = "₹" + rev.toFixed(2);
            document.getElementById('user-stats-preview').classList.remove('hidden');
        }

        // ADD / DEDUCT BALANCES BY USER ID
        function applyLedgerChanges() {
            const uid = document.getElementById('target-uid').value.trim();
            if(!uid) { alert("Enter a valid target User ID profile first."); return; }

            const balMod = parseFloat(document.getElementById('mod-balance').value) || 0;
            const revMod = parseFloat(document.getElementById('mod-revenue').value) || 0;

            let currentBal = parseFloat(localStorage.getItem(`balance_${uid}`) || 0);
            let currentRev = parseFloat(localStorage.getItem(`revenue_${uid}`) || 0);

            // Mutate data sheets
            currentBal += balMod;
            currentRev += revMod;

            localStorage.setItem(`balance_${uid}`, currentBal.toFixed(2));
            localStorage.setItem(`revenue_${uid}`, currentRev.toFixed(2));

            alert(`Successfully updated metrics for ${uid}!\nNew Balance: ₹${currentBal.toFixed(2)}\nNew Revenue: ₹${currentRev.toFixed(2)}`);
            
            // Refresh fields
            document.getElementById('mod-balance').value = '';
            document.getElementById('mod-revenue').value = '';
            lookupUserMetrics();
        }

        // PARSE INCOMING USERS QUEUES
        function loadUpiQueue() {
            const container = document.getElementById('queue-container');
            container.innerHTML = '';
            let queue = JSON.parse(localStorage.getItem('admin_utr_queue') || '[]');

            if(queue.length === 0) {
                container.innerHTML = `<p class="text-xs text-zinc-500 text-center py-6 italic">No pending payment receipts in queue.</p>`;
                return;
            }

            queue.forEach((item, idx) => {
                container.innerHTML += `
                    <div class="bg-slate-950/60 border border-slate-800 rounded-xl p-3.5 text-xs font-mono space-y-2">
                        <div class="flex justify-between items-center border-b border-slate-800/40 pb-1.5">
                            <span class="text-blue-400 font-bold">${item.userId}</span>
                            <span class="text-zinc-500 text-[10px]">${item.timestamp}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-1 text-[11px] text-zinc-400">
                            <div>Node: <strong class="text-slate-200">${item.packageName}</strong></div>
                            <div>UTR Ref: <strong class="text-amber-400 select-all">${item.utr}</strong></div>
                            <div class="col-span-2 mt-0.5">Deposit Value: <strong class="text-emerald-400 text-xs">₹${item.amount}</strong></div>
                        </div>
                        <div class="flex gap-2 pt-1">
                            <button onclick="approveTransaction(${idx})" class="flex-1 bg-emerald-600/20 hover:bg-emerald-600 text-emerald-400 hover:text-white border border-emerald-500/20 font-bold py-1.5 rounded-lg text-[10px] uppercase tracking-wide transition cursor-pointer">
                                Approve Account
                            </button>
                            <button onclick="rejectTransaction(${idx})" class="bg-rose-600/10 hover:bg-rose-600 text-rose-500 hover:text-white border border-rose-500/10 px-3 py-1.5 rounded-lg text-[10px] uppercase tracking-wide transition cursor-pointer">
                                Reject
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function approveTransaction(index) {
            let queue = JSON.parse(localStorage.getItem('admin_utr_queue') || '[]');
            const tx = queue[index];

            // Load arrays for user profile context matching records
            let packages = JSON.parse(localStorage.getItem(`packages_${tx.userId}`) || '[]');
            
            // Add package node to active inventory tracking array blocks
            packages.push({
                name: tx.packageName,
                price: tx.amount,
                daily: tx.dailyRate,
                lastPayoutDate: "" // Empty ensures payout will trigger on immediate cycle pass 4:00 AM
            });

            localStorage.setItem(`packages_${tx.userId}`, JSON.stringify(packages));
            
            // Automatically flip flag causing customized system notification popup modal on verification check
            localStorage.setItem(`popup_alert_${tx.userId}`, "true");

            // Drop structural row tracking out of array queue mapping frames
            queue.splice(index, 1);
            localStorage.setItem('admin_utr_queue', JSON.stringify(queue));
            
            alert("Package deployed to user index. Prompt pushed alert configuration updates.");
            loadUpiQueue();
        }

        function rejectTransaction(index) {
            let queue = JSON.parse(localStorage.getItem('admin_utr_queue') || '[]');
            queue.splice(index, 1);
            localStorage.setItem('admin_utr_queue', JSON.stringify(queue));
            alert("Transaction dismissed from data layout pipeline logs.");
            loadUpiQueue();
        }

        // ADVERTISING BROADCAST REGISTRIES ENGINE
        function saveGlobalNotice() {
            const msg = document.getElementById('global-notice-input').value.trim();
            localStorage.setItem('global_admin_notice', msg || "Nodes fully functional");
            alert("Global broadcast message frame refreshed!");
        }

        function pushUserAlert() {
            const uid = document.getElementById('alert-target-uid').value.trim();
            const msg = document.getElementById('specific-notice-input').value.trim();
            
            if(!uid) { alert("Enter an active profile index."); return; }
            
            if(msg) {
                localStorage.setItem(`notice_${uid}`, msg);
                alert(`Custom profile status line attached explicitly to user context ${uid}`);
            } else {
                localStorage.removeItem(`notice_${uid}`);
                alert("Custom row wiped cleanly.");
            }
        }

        // Init Lifecycle
        loadUpiQueue();
        document.getElementById('global-notice-input').value = localStorage.getItem('global_admin_notice') || "";
    </script>
</body>
                  </html>
